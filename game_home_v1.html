<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON BEAT — HOME</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{width:100vw;height:100vh;display:flex;align-items:flex-start;justify-content:center;background:#000;overflow:hidden;}
body{width:min(100vw,844px);height:390px;max-height:390px;overflow:hidden;position:relative;background:linear-gradient(135deg,#fce8f8 0%,#e8f4ff 45%,#f8fff0 75%,#fff6e8 100%);font-family:'Orbitron',monospace;}
/* ── デコ丸 ── */
.deco{display:none!important;}
.deco.d1{width:52px;height:52px;border:2px solid rgba(255,150,220,.55);top:8%;right:3%;}
.deco.d2{width:28px;height:28px;border:2px solid rgba(80,200,255,.55);top:22%;left:2%;animation-delay:.8s;opacity:.65;}
.deco.d3{width:20px;height:20px;border:2px solid rgba(255,220,60,.55);bottom:22%;right:8%;animation-delay:.4s;opacity:.7;}
.deco.d4{width:38px;height:38px;border:1.5px solid rgba(200,150,255,.50);bottom:8%;left:3%;animation-delay:1.2s;opacity:.5;}
.deco.d5{width:16px;height:16px;border:1.5px solid rgba(80,220,200,.50);top:62%;left:36%;animation-delay:2s;opacity:.4;}
@keyframes decoFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

/* ── Canvas layers ── */
#gc{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;}
#gc-front{position:absolute;top:0;left:0;width:100%;height:100%;z-index:8;pointer-events:none;}

/* ═══════════════════════════════
   STATUS BAR
═══════════════════════════════ */
.status-bar{
  position:absolute;top:0;left:0;width:100%;height:42px;z-index:12;
  background:#000;
  border-bottom:none;
  backdrop-filter:none;-webkit-backdrop-filter:none;
  display:flex;align-items:center;padding:0 10px;gap:6px;
  /* ネオン発光ボーダー */
  box-shadow:
    0 0 12px rgba(0,220,200,.35),
    0 0 28px rgba(255,60,180,.22),
    0 2px 18px rgba(180,80,255,.20),
    inset 0 -1px 8px rgba(0,220,200,.12);
  animation:barGlow 2.5s ease-in-out infinite;
}
@keyframes barGlow{
  0%,100%{
    box-shadow:0 0 10px rgba(0,220,200,.30),0 0 24px rgba(255,60,180,.18),0 2px 14px rgba(180,80,255,.16),inset 0 -1px 6px rgba(0,220,200,.10);
    border-bottom-color:rgba(0,220,200,.32);
  }
  50%{
    box-shadow:0 0 20px rgba(0,240,220,.60),0 0 40px rgba(255,60,180,.38),0 2px 28px rgba(180,80,255,.32),inset 0 -1px 12px rgba(0,220,200,.22);
    border-bottom-color:rgba(0,240,220,.65);
  }
}
/* 左: プレイヤー情報 */
.sb-player{
  display:flex;align-items:center;gap:5px;
  background:linear-gradient(rgba(0,8,18,.80),rgba(0,8,18,.80)) padding-box,
             linear-gradient(135deg,#00f0dc,#50a0ff,#a064ff) border-box;
  border:1px solid transparent;
  border-radius:20px;padding:3px 8px 3px 4px;
  box-shadow:0 0 8px rgba(0,240,220,.40),0 0 18px rgba(0,200,220,.20);
  animation:playerGlow 2.4s ease-in-out infinite;
}
@keyframes playerGlow{
  0%,100%{box-shadow:0 0 6px rgba(0,240,220,.40),0 0 14px rgba(0,200,220,.18);}
  50%{box-shadow:0 0 14px rgba(0,240,220,.85),0 0 30px rgba(0,200,255,.45),0 0 50px rgba(80,160,255,.20);}
}
.sb-avatar{
  width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,#00ffd0,#ff5db8);
  border:1.5px solid rgba(0,230,200,.55);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;line-height:1;
  box-shadow:0 0 8px rgba(0,220,180,.45);
}
.sb-lv{
  font-family:'Orbitron',monospace;font-size:8px;font-weight:700;
  background:linear-gradient(90deg,#00ffd0,#aaffee);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.sb-lv span{font-size:11px;font-weight:900;}

/* スタミナ */
.sb-stamina{
  display:flex;align-items:center;gap:4px;flex:1;
  background:linear-gradient(rgba(0,10,14,.80),rgba(0,10,14,.80)) padding-box,
             linear-gradient(90deg,#00f0dc,#00c8ff,#00f0dc) border-box;
  border:1px solid transparent;
  border-radius:20px;padding:3px 8px;
  box-shadow:0 0 8px rgba(0,240,220,.35),0 0 20px rgba(0,200,220,.15);
  animation:stamGlow 2.4s ease-in-out infinite .4s;
}
@keyframes stamGlow{
  0%,100%{box-shadow:0 0 6px rgba(0,240,220,.35),0 0 16px rgba(0,200,220,.14);}
  50%{box-shadow:0 0 14px rgba(0,240,220,.80),0 0 32px rgba(0,220,255,.45),0 0 55px rgba(0,200,220,.20);}
}
.sb-sta-icon{font-size:11px;filter:drop-shadow(0 0 4px rgba(0,220,200,.9));}
.sb-sta-bar-wrap{flex:1;height:7px;background:rgba(0,0,0,.5);border-radius:4px;overflow:hidden;position:relative;}
.sb-sta-bar{
  height:100%;width:75%;border-radius:4px;
  background:linear-gradient(90deg,#00c8a0,#00ffd0,#7affee);
  box-shadow:0 0 6px rgba(0,220,200,.7);
  animation:stamPulse 2s ease-in-out infinite;
}
@keyframes stamPulse{0%,100%{box-shadow:0 0 5px rgba(0,220,200,.65);}50%{box-shadow:0 0 10px rgba(0,220,200,1);}}
.sb-sta-txt{font-family:'Share Tech Mono',monospace;font-size:7px;color:rgba(0,230,200,.80);white-space:nowrap;}

/* ダイヤ */
.sb-gems{
  display:flex;align-items:center;gap:3px;
  background:linear-gradient(rgba(8,0,18,.80),rgba(8,0,18,.80)) padding-box,
             linear-gradient(135deg,#a064ff,#f03caa,#a064ff) border-box;
  border:1px solid transparent;
  border-radius:20px;padding:3px 7px;
  box-shadow:0 0 8px rgba(160,100,255,.45),0 0 18px rgba(240,60,170,.20);
  animation:gemsGlow 2.4s ease-in-out infinite .8s;
}
@keyframes gemsGlow{
  0%,100%{box-shadow:0 0 6px rgba(160,100,255,.40),0 0 14px rgba(240,60,170,.18);}
  50%{box-shadow:0 0 14px rgba(160,100,255,.90),0 0 30px rgba(240,60,170,.55),0 0 52px rgba(180,80,255,.25);}
}
.sb-gem-icon{font-size:11px;filter:drop-shadow(0 0 5px rgba(180,100,255,.90));}
.sb-gem-val{
  font-family:'Orbitron',monospace;font-size:9px;font-weight:700;
  background:linear-gradient(90deg,#cc88ff,#ffffff,#cc88ff);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}

/* 設定 */
.sb-settings{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(rgba(5,5,15,.85),rgba(5,5,15,.85)) padding-box,
             linear-gradient(135deg,#00f0dc,#a064ff,#f03caa,#00dcff) border-box;
  border:1px solid transparent;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;cursor:pointer;
  box-shadow:0 0 8px rgba(0,240,220,.45),0 0 18px rgba(160,100,255,.25),0 0 30px rgba(240,60,170,.15);
  animation:settingsGlow 2.4s ease-in-out infinite 1.2s;
  transition:transform .2s;
}
.sb-settings:hover{transform:rotate(45deg);}
@keyframes settingsGlow{
  0%,100%{box-shadow:0 0 6px rgba(0,240,220,.40),0 0 14px rgba(160,100,255,.22),0 0 24px rgba(240,60,170,.12);}
  50%{box-shadow:0 0 14px rgba(0,240,220,.90),0 0 28px rgba(160,100,255,.60),0 0 48px rgba(240,60,170,.35),0 0 70px rgba(0,220,255,.18);}
}

/* ═══════════════════════════════
   LIZ AREA（左側）
═══════════════════════════════ */
.liz-area{
  position:absolute;top:42px;left:0;
  width:48%;height:calc(100% - 42px);
  z-index:6;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
}

/* 吹き出し（body直下・顔の下に配置） */
.speech-bubble{
  position:absolute;
  /* LIZの顔(〜top:145px)より下、胸あたりに配置 */
  top:162px;left:3%;
  width:148px;
  background:linear-gradient(135deg,
    rgba(255,255,255,.93) 0%,rgba(240,255,252,.90) 100%);
  border:2px solid rgba(0,220,200,.52);
  /* 右端にしっぽ＝LIZ方向（右）に向ける */
  border-radius:16px 4px 16px 16px;
  padding:6px 9px;
  z-index:7; /* liz-area(z:6)より前、menu-area(z:10)より後ろ */
  box-shadow:
    0 0 14px rgba(0,220,200,.38),
    0 0 28px rgba(255,90,180,.20),
    inset 0 0 8px rgba(255,255,255,.65);
  animation:bubbleBob 3.4s ease-in-out infinite;
}
@keyframes bubbleBob{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-3px);}
}
/* しっぽ：右向き（LIZの体＝右方向に向ける） */
.speech-bubble::after{
  content:'';position:absolute;
  right:-10px;top:14px;
  border:5px solid transparent;
  border-left:9px solid rgba(0,220,200,.52);
}
.speech-bubble::before{
  content:'';position:absolute;
  right:-7px;top:15px;
  border:4px solid transparent;
  border-left:8px solid rgba(240,255,252,.90);
  z-index:1;
}
.bubble-name{
  font-family:'Noto Sans JP',sans-serif;font-size:7.5px;font-weight:900;
  color:#00a888;letter-spacing:.05em;margin-bottom:3px;
  display:flex;align-items:center;gap:3px;
}
.bubble-name::before{content:'♪';color:#ff5db8;font-size:8px;}
.bubble-text{
  font-family:'Noto Sans JP',sans-serif;font-size:9px;font-weight:700;
  color:#2a2a4a;line-height:1.45;letter-spacing:.01em;
}
.bubble-text em{
  font-style:normal;
  background:linear-gradient(90deg,#00b89a,#ff5db8);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}

/* LIZ立ち絵 */
.liz-img{
  height:90%;width:auto;object-fit:contain;
  mix-blend-mode:normal;
  transform-origin:bottom center;
  filter:
    drop-shadow(0 0 12px rgba(255,90,180,.50))
    drop-shadow(0 0 28px rgba(0,220,200,.35));
  animation:lizBob 3.4s ease-in-out infinite;
}
@keyframes lizBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

/* ═══════════════════════════════
   MENU BUTTONS（右側）
═══════════════════════════════ */
/* ═══ MENU AREA + NODE GRAPH BUTTONS ═══ */
.menu-area{
  position:absolute;top:42px;right:0;
  width:57%;height:calc(100% - 42px);
  z-index:10;
  pointer-events:none;
}
.node-svg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:visible;
}
.node-line{stroke:rgba(0,195,172,0.42);stroke-width:0.7;}
.node-line-sub{stroke:rgba(0,195,172,0.22);stroke-width:0.5;}
.node-junct{fill:rgba(0,195,172,0.52);}

/* サイバーノイズ瞬間グリッチ */
@keyframes cyberNoise{
  0%,84%,100%{transform:translate(0,0);clip-path:none;filter:none;}
  85%{transform:translate(-2px,1px);clip-path:inset(12% 0 80% 0);filter:brightness(1.5) hue-rotate(18deg);}
  86%{transform:translate(2px,-1px);clip-path:inset(72% 0 8% 0);filter:saturate(2);}
  87%{transform:translate(0,0);clip-path:none;filter:none;}
  88%{clip-path:inset(42% 0 46% 0);filter:brightness(1.3) hue-rotate(-12deg);}
  89%{clip-path:none;filter:none;}
}

.nnode{
  position:absolute;border-radius:50%;
  pointer-events:all;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  user-select:none;transition:transform .12s,box-shadow .12s;
  overflow:hidden;
}
.nnode:active{transform:scale(0.90)!important;}

/* LIVE — 大きな円、ミント */
.nnode-live{
  width:118px;height:118px;top:22%;left:14%;
  background:linear-gradient(175deg,#edfcf9 0%,#b0eee6 55%,#6ed8cc 100%);
  border:2px solid rgba(0,185,165,0.60);
  box-shadow:0 6px 18px rgba(0,170,152,0.32),0 2px 6px rgba(0,170,152,0.18),inset 0 3px 8px rgba(255,255,255,0.95),inset 0 -3px 6px rgba(80,205,190,0.42);
  animation:cyberNoise 7s ease-in-out infinite;
}
.nnode-live::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,0.50),transparent);
  border-radius:50% 50% 0 0;pointer-events:none;
}
.nnode-live .nnode-badge{
  position:absolute;top:0;right:4px;
  font-family:'Share Tech Mono',monospace;font-size:5.5px;
  background:rgba(0,155,138,0.85);color:#fff;
  padding:1px 5px;border-radius:0 0 5px 5px;letter-spacing:.06em;
}
.nnode-live .nnode-label{
  font-family:'Orbitron',monospace;font-size:26px;font-weight:900;
  letter-spacing:.10em;color:#006d5e;
  text-shadow:0 1px 4px rgba(0,130,115,0.40);line-height:1;
}
.nnode-live .nnode-sub{
  font-family:'Share Tech Mono',monospace;font-size:5.5px;
  letter-spacing:.18em;color:rgba(0,115,100,0.60);margin-top:2px;
}

/* STORY — 中・ラベンダー */
.nnode-story{
  width:84px;height:84px;top:5%;right:5%;
  background:linear-gradient(175deg,#f4f2ff 0%,#d6cef8 55%,#b2a2e4 100%);
  border:2px solid rgba(125,98,205,0.52);
  box-shadow:0 5px 14px rgba(105,80,185,0.25),0 2px 5px rgba(105,80,185,0.16),inset 0 3px 7px rgba(255,255,255,0.95),inset 0 -2px 5px rgba(165,145,228,0.42);
  animation:cyberNoise 5.5s ease-in-out infinite 1.8s;
}
.nnode-story::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,0.50),transparent);
  border-radius:50% 50% 0 0;pointer-events:none;
}
.nnode-story .nnode-label{
  font-family:'Orbitron',monospace;font-size:12px;font-weight:700;
  letter-spacing:.04em;color:#4a32a0;
}

/* CHARACTER — 中・ローズ */
.nnode-char{
  width:84px;height:84px;top:56%;left:5%;
  background:linear-gradient(175deg,#fff2f7 0%,#f8cce0 55%,#eda8ca 100%);
  border:2px solid rgba(205,88,140,0.52);
  box-shadow:0 5px 14px rgba(185,68,120,0.22),0 2px 5px rgba(185,68,120,0.16),inset 0 3px 7px rgba(255,255,255,0.95),inset 0 -2px 5px rgba(238,158,198,0.42);
  animation:cyberNoise 6s ease-in-out infinite 0.9s;
}
.nnode-char::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,0.50),transparent);
  border-radius:50% 50% 0 0;pointer-events:none;
}
.nnode-char .nnode-label{
  font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
  letter-spacing:.03em;color:#a83268;
}

/* GACHA — 中大・ゴールド */
.nnode-gacha{
  width:94px;height:94px;top:49%;right:5%;
  background:linear-gradient(175deg,#fffbe0 0%,#ffe87a 55%,#fecf30 100%);
  border:2px solid rgba(190,150,8,0.58);
  box-shadow:0 5px 16px rgba(170,130,0,0.28),0 2px 5px rgba(170,130,0,0.18),inset 0 3px 8px rgba(255,255,255,0.95),inset 0 -2px 5px rgba(240,200,60,0.42);
  animation:cyberNoise 6.8s ease-in-out infinite 2.5s;
}
.nnode-gacha::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,0.50),transparent);
  border-radius:50% 50% 0 0;pointer-events:none;
}
.nnode-gacha .nnode-new{
  position:absolute;top:-3px;right:5px;
  font-family:'Share Tech Mono',monospace;font-size:6px;
  background:linear-gradient(90deg,#d83880,#ff00a8);
  color:#fff;padding:1px 5px;border-radius:3px;
  box-shadow:0 0 6px rgba(220,56,128,0.60);
}
.nnode-gacha .nnode-label{
  font-family:'Orbitron',monospace;font-size:14px;font-weight:900;
  letter-spacing:.06em;color:#5e3e00;
  text-shadow:0 1px 4px rgba(110,72,0,0.36);line-height:1;
}



/* ═══════════════════════════════
   BACK BUTTON（左上）— 光沢シルバー統一
═══════════════════════════════ */
@keyframes rainbowGlow{
  0%,100%{box-shadow:0 0 8px rgba(0,240,220,.60),0 0 18px rgba(160,100,255,.45),0 0 30px rgba(240,60,170,.30);}
  50%{box-shadow:0 0 14px rgba(0,240,220,.95),0 0 28px rgba(160,100,255,.75),0 0 48px rgba(240,60,170,.55),0 0 70px rgba(0,220,255,.30);}
}
.back-btn{
  flex-shrink:0;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(#0a0a0a,#0a0a0a) padding-box,
             linear-gradient(135deg,#00f0dc,#a064ff,#f03caa,#00dcff,#00f0dc) border-box;
  border:1.8px solid transparent;
  text-decoration:none;pointer-events:all;overflow:hidden;
  box-shadow:0 0 8px rgba(0,240,220,.60),0 0 18px rgba(160,100,255,.45),0 0 30px rgba(240,60,170,.30);
  animation:rainbowGlow 2.4s ease-in-out infinite;
  transition:transform .18s;
  font-size:13px;
  margin-right:2px;
  position:relative;
}
.back-btn:hover{transform:scale(1.12);}
.back-arrow{
  color:transparent;
  -webkit-text-fill-color:transparent;
  background:linear-gradient(135deg,#00f0dc,#a064ff,#f03caa);
  -webkit-background-clip:text;background-clip:text;
  filter:drop-shadow(0 0 4px rgba(0,240,220,.9));
}

/* ── tap ripple ── */
.ripple{
  position:fixed;border-radius:50%;pointer-events:none;z-index:30;
  border:2px solid rgba(0,255,210,.80);
  animation:ripOut .5s ease-out forwards;
}
@keyframes ripOut{
  0%{width:0;height:0;margin:0;opacity:.9;}
  100%{width:120px;height:120px;margin:-60px;opacity:0;}
}
</style>
<style>
body{background:#000!important;}

.home-video-bg{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;object-position:center;
  z-index:0;pointer-events:none;
}

/* ════════════════════════════════════════════
   3カラムレイアウト
   LEFT: LIZ(29%) | CENTER: MENU(42%) | RIGHT: NOA(29%)
   ════════════════════════════════════════════ */

/* ── LIZ エリア（左） ── */
.liz-area{
  position:absolute!important;top:42px!important;left:0!important;
  width:29%!important;height:calc(100% - 42px)!important;
  overflow:visible!important;
  z-index:6;pointer-events:none;
  display:flex!important;flex-direction:column;
  align-items:center;justify-content:flex-end;
}
.liz-img{
  height:90%;width:auto;object-fit:contain;
  mix-blend-mode:screen;
  transform-origin:bottom center;
  filter:
    drop-shadow(0 0 12px rgba(255,80,180,.52))
    drop-shadow(0 0 28px rgba(0,220,200,.35));
  animation:lizBob 3.4s ease-in-out infinite;
}
@keyframes lizBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

/* ── MENU AREA（中央・カルーセル） ── */
.menu-area{
  position:absolute!important;
  top:42px!important;left:26%!important;right:auto!important;
  width:48%!important;height:calc(100% - 42px)!important;
  z-index:10;pointer-events:none;
  display:flex!important;flex-direction:column!important;
  flex-wrap:nowrap!important;
  align-items:center!important;justify-content:center!important;
  gap:14px!important;
}
.node-svg{display:none!important;}

/* ── カルーセルラッパー ── */
.carr-wrap{
  display:flex!important;
  flex-direction:row!important;
  align-items:center!important;
  justify-content:center!important;
  gap:10px!important;
  pointer-events:all!important;
}
.carr-arrow{
  width:28px!important;height:28px!important;
  border-radius:50%!important;
  background:rgba(0,220,200,.10)!important;
  border:1.5px solid rgba(0,220,200,.40)!important;
  color:rgba(0,220,200,.85)!important;
  font-size:11px!important;
  cursor:pointer!important;
  pointer-events:all!important;
  display:flex!important;align-items:center!important;justify-content:center!important;
  transition:all .15s!important;
  flex-shrink:0!important;
  padding:0!important;outline:none!important;
  -webkit-appearance:none!important;
  line-height:1!important;
}

<script>
/* ── Canvas setup ── */
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const W=()=>canvas.width, H=()=>canvas.height;
function resize(){canvas.width=window.innerWidth;canvas.height=Math.min(390,window.innerHeight);}
resize();window.addEventListener('resize',resize);

const canvasF=document.getElementById('gc-front');
const ctxF=canvasF.getContext('2d');
function resizeF(){canvasF.width=window.innerWidth;canvasF.height=Math.min(390,window.innerHeight);}
resizeF();window.addEventListener('resize',resizeF);

let frame=0;

/* BG */
/* 背景は動画に変更 — canvas は透明クリアのみ */
function drawBG(){ctx.clearRect(0,0,W(),H());}

/* ── Stage floor ── */
function drawFloor(){
  const w=W(),h=H();
  const vpY=h*.62,vpX=w/2;
  const fg=ctx.createLinearGradient(0,vpY,0,h);
  fg.addColorStop(0,'rgba(255,210,240,0)');
  fg.addColorStop(.3,'rgba(255,185,225,.07)');
  fg.addColorStop(1,'rgba(210,175,255,.15)');
  ctx.fillStyle=fg;ctx.fillRect(0,vpY,w,h-vpY);
  for(let i=0;i<10;i++){
    const t=i/10,y=vpY+(h-vpY)*(t*t);
    const a=.06+t*.22;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);
    ctx.strokeStyle=i%2===0?`rgba(0,220,200,${a})`:`rgba(160,60,255,${a})`;
    ctx.lineWidth=.7;ctx.stroke();
  }
  for(let i=0;i<=18;i++){
    const bx=(w/18)*i;
    const vg=ctx.createLinearGradient(vpX,vpY,bx,h);
    vg.addColorStop(0,'rgba(0,180,180,0)');
    vg.addColorStop(.3,`rgba(0,180,180,.07)`);
    vg.addColorStop(1,`rgba(160,80,255,.08)`);
    ctx.beginPath();ctx.moveTo(vpX,vpY);ctx.lineTo(bx,h);
    ctx.strokeStyle=vg;ctx.lineWidth=.45;ctx.stroke();
  }
  // character foot glow (left side)
  const sg=ctx.createRadialGradient(w*.24,h,0,w*.24,h,w*.32);
  sg.addColorStop(0,'rgba(255,150,210,.14)');
  sg.addColorStop(.4,'rgba(200,100,255,.07)');
  sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sg;ctx.fillRect(0,vpY,w,h-vpY);
}

/* ── Spotlights ── */
function drawSpotlights(){
  const w=W(),h=H();
  const t=frame*.007;
  const spots=[
    {x:w*(.14+Math.sin(t)*.02),col:'0,200,180',a:.08,spread:55,tgt:h*.80},
    {x:w*(.50+Math.sin(t*.75+1)*.02),col:'180,90,255',a:.06,spread:65,tgt:h*.84},
    {x:w*(.86+Math.sin(t*.9+2)*.02),col:'255,80,180',a:.08,spread:55,tgt:h*.80},
  ];
  spots.forEach(s=>{
    const sg=ctx.createLinearGradient(s.x,8,s.x,s.tgt);
    sg.addColorStop(0,`rgba(${s.col},${s.a*1.3})`);
    sg.addColorStop(.7,`rgba(${s.col},${s.a})`);
    sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.moveTo(s.x-12,8);ctx.lineTo(s.x+12,8);
    ctx.lineTo(s.x+s.spread,s.tgt);ctx.lineTo(s.x-s.spread,s.tgt);
    ctx.closePath();ctx.fillStyle=sg;ctx.fill();
  });
}

/* ── Concert rig ── */
function drawRig(){
  const w=W();
  ctx.fillStyle='rgba(255,225,248,.25)';ctx.fillRect(0,0,w,8);
  const nc=22;
  const cols=['0,230,180','255,90,180','180,90,255','255,200,60','0,180,255','255,255,255'];
  for(let i=0;i<nc;i++){
    const x=(i/(nc-1))*w;
    const t2=frame*.055+i*.50;
    const intensity=(Math.sin(t2)+1)/2;
    if(intensity>.30){
      const a=.6+intensity*.4;
      const c=cols[i%cols.length];
      ctx.beginPath();ctx.arc(x,4.5,3,0,Math.PI*2);
      ctx.fillStyle=`rgba(${c},${a})`;
      ctx.shadowBlur=10;ctx.shadowColor=`rgba(${c},.8)`;ctx.fill();ctx.shadowBlur=0;
      const bg=ctx.createLinearGradient(x,8,x,44);
      bg.addColorStop(0,`rgba(${c},${intensity*.14})`);bg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.moveTo(x-4,8);ctx.lineTo(x+4,8);ctx.lineTo(x+16,44);ctx.lineTo(x-16,44);
      ctx.closePath();ctx.fillStyle=bg;ctx.fill();
    }
  }
}

/* ── BG star deco ── */
function drawStar4(x,y,r,col){
  ctx.save();ctx.translate(x,y);
  ctx.beginPath();
  ctx.moveTo(0,-r);ctx.lineTo(r*.28,-r*.28);ctx.lineTo(r,0);ctx.lineTo(r*.28,r*.28);
  ctx.lineTo(0,r);ctx.lineTo(-r*.28,r*.28);ctx.lineTo(-r,0);ctx.lineTo(-r*.28,-r*.28);
  ctx.closePath();ctx.fillStyle=col;
  ctx.shadowBlur=r*2;ctx.shadowColor=col;ctx.fill();ctx.shadowBlur=0;ctx.restore();
}
const BG_STARS=[
  {x:.05,y:.22,r:10,col:'rgba(0,220,180,.28)'},{x:.95,y:.20,r:9,col:'rgba(255,90,180,.28)'},
  {x:.02,y:.64,r:8,col:'rgba(180,100,255,.25)'},{x:.98,y:.68,r:10,col:'rgba(255,210,60,.26)'},
  {x:.50,y:.06,r:7,col:'rgba(0,200,255,.22)'},
];
function drawBGStars(){
  BG_STARS.forEach(s=>{
    const pulse=.60+Math.sin(frame*.034+s.x*10)*.40;
    drawStar4(s.x*W(),s.y*H(),s.r*pulse,s.col);
  });
}

/* ── Background sparkles ── */
class Spark{
  constructor(){this.init();}
  init(){
    const w=W(),h=H();
    this.x=Math.random()*w;this.y=Math.random()*h;
    this.r=Math.random()*2.2+.4;
    this.vx=(Math.random()-.5)*.4;this.vy=-(Math.random()*.6+.1);
    this.life=0;this.max=Math.random()*110+45;
    this.type=Math.random();
    const rnd=Math.random();
    if(rnd<.28)      this.col='0,230,180';
    else if(rnd<.52) this.col='255,90,180';
    else if(rnd<.70) this.col='175,95,255';
    else if(rnd<.82) this.col='255,215,55';
    else if(rnd<.92) this.col='0,200,255';
    else             this.col='255,255,255';
  }
  step(){this.x+=this.vx;this.y+=this.vy;this.life++;if(this.life>this.max)this.init();}
  draw(){
    const fi=Math.min(1,this.life/14),fo=Math.max(0,1-(this.life-this.max*.6)/(this.max*.4));
    const a=.75*fi*fo;if(a<.01)return;
    ctx.shadowBlur=this.r*5;ctx.shadowColor=`rgba(${this.col},${a*.6})`;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${this.col},${a})`;ctx.fill();ctx.shadowBlur=0;
  }
}
const sparks=Array.from({length:80},()=>new Spark());

/* ── Front sparkles ── */
class FrontSpark{
  constructor(){this.init();}
  init(){
    this.x=Math.random()*canvasF.width;
    this.y=Math.random()*canvasF.height*.88;
    this.r=Math.random()*2.8+1.0;
    this.vx=(Math.random()-.5)*.5;this.vy=-(Math.random()*.6+.12);
    this.life=0;this.max=Math.random()*90+50;
    this.type=Math.random();
    const rnd=Math.random();
    if(rnd<.30)      this.col='0,235,200';
    else if(rnd<.55) this.col='255,90,180';
    else if(rnd<.72) this.col='180,100,255';
    else if(rnd<.86) this.col='255,215,60';
    else             this.col='255,255,255';
  }
  step(){this.x+=this.vx;this.y+=this.vy;this.life++;if(this.life>this.max)this.init();}
  draw(){
    const fi=Math.min(1,this.life/12),fo=Math.max(0,1-(this.life-this.max*.62)/(this.max*.38));
    const a=.88*fi*fo;if(a<.01)return;
    ctxF.shadowBlur=this.r*7;ctxF.shadowColor=`rgba(${this.col},${a*.65})`;
    if(this.type<.50){
      ctxF.beginPath();ctxF.arc(this.x,this.y,this.r,0,Math.PI*2);
      ctxF.fillStyle=`rgba(${this.col},${a})`;ctxF.fill();
    } else {
      const s=this.r*2.6;
      ctxF.beginPath();
      ctxF.moveTo(this.x,this.y-s);ctxF.lineTo(this.x+s*.28,this.y-s*.28);
      ctxF.lineTo(this.x+s,this.y);ctxF.lineTo(this.x+s*.28,this.y+s*.28);
      ctxF.lineTo(this.x,this.y+s);ctxF.lineTo(this.x-s*.28,this.y+s*.28);
      ctxF.lineTo(this.x-s,this.y);ctxF.lineTo(this.x-s*.28,this.y-s*.28);
      ctxF.closePath();ctxF.fillStyle=`rgba(${this.col},${a})`;ctxF.fill();
    }
    ctxF.shadowBlur=0;
  }
}
const frontSparks=Array.from({length:28},()=>new FrontSpark());

/* ── Tap ripple ── */
function ripple(e){
  const d=document.createElement('div');
  d.className='ripple';
  d.style.cssText=`left:${e.clientX-60}px;top:${e.clientY-60}px;`;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),520);
}

    label:'LIVE',
    btmText:'RHYTHM', btmCls:'nnode-sub',

  },
  {
    cls:'nnode-story',
    topText:'', topCls:'',
    label:'STORY',
    btmText:'', btmCls:'',
    action(e){ ripple(e); setTimeout(()=>{ location.href='game_story_v1.html'; }, 320); }
  },
  {
    cls:'nnode-char',
    topText:'', topCls:'',
    label:'CHAR',
    btmText:'', btmCls:'',
    action(e){ ripple(e); }
  },
  {
    cls:'nnode-gacha',
    topText:'NEW', topCls:'nnode-new',
    label:'GACHA',
    btmText:'', btmCls:'',
    action(e){ ripple(e); setTimeout(()=>{ location.href='game_gacha_v1.html'; }, 320); }
  }
];
let carIdx = 0;
let carBusy = false;
const carVariants = ['nnode-live','nnode-story','nnode-char','nnode-gacha'];

/* ── カルーセルに連動するキャラ画像 ── */
const carImages = [
  'リズ　ルナ　バトル.png',  /* 0: LIVE  */
  'リズ　おつかれ.png',      /* 1: STORY */
  'ルナ　ポーズ.png',        /* 2: CHAR  */
  'リズ　ルナ_メイン.png'   /* 3: GACHA */
];

function carApply(){
  const d = carData[carIdx];
  const btn = document.getElementById('carr-btn');
  carVariants.forEach(c => btn.classList.remove(c));
  btn.classList.add(d.cls);

  const topEl = document.getElementById('carr-top');
  topEl.innerHTML = d.topText;
  topEl.className = d.topCls;
  topEl.style.display = d.topText ? '' : 'none';

  document.getElementById('carr-label').textContent = d.label;

  const btmEl = document.getElementById('carr-btm');
  btmEl.textContent = d.btmText;
  btmEl.className = d.btmCls;
  btmEl.style.display = d.btmText ? '' : 'none';

  document.querySelectorAll('.carr-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === carIdx);
  });

  /* キャラ画像切替 */
  const lizArea = document.querySelector('.liz-area');
  const lizImg  = document.querySelector('.liz-img');
  const imgSrc  = carImages[carIdx];
  if (!imgSrc) {
    lizArea.style.visibility = 'hidden';
  } else {
    lizArea.style.visibility = 'visible';
    lizImg.src = imgSrc;
  }
}

/* 初期状態をLIVE(0)に同期 */
document.addEventListener('DOMContentLoaded', ()=>{ carApply(); });

function carSpin(dir){
  if(carBusy) return;
  carBusy = true;
  const btn = document.getElementById('carr-btn');
  btn.classList.add('spinning');
  setTimeout(()=>{
    carIdx = (carIdx + dir + 4) % 4;
    carApply();
  }, 200);
  setTimeout(()=>{
    document.getElementById('carr-btn').classList.remove('spinning');
    carBusy = false;
  }, 480);
}

function carNext(e){ e && e.stopPropagation(); carSpin(1); }
function carPrev(e){ e && e.stopPropagation(); carSpin(-1); }
function carGoto(e, i){ e && e.stopPropagation(); if(i !== carIdx) carSpin(i > carIdx ? 1 : -1); }
function carClick(e){ if(!carBusy) carData[carIdx].action(e); }

/* ── Render ── */
function render(){
  frame++;
  ctx.clearRect(0,0,W(),H());
  drawBG();drawFloor();
  drawVignette();
  ctxF.clearRect(0,0,canvasF.width,canvasF.height);
  requestAnimationFrame(render);
}
render();

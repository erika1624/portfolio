<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>スマホ・GAME</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{width:100vw;height:100vh;display:flex;align-items:flex-start;justify-content:center;background:#000;overflow:hidden;}
body{width:min(100vw,844px);height:390px;max-height:390px;overflow:hidden;position:relative;background:linear-gradient(135deg,#fce8f8 0%,#e8f4ff 45%,#f8fff0 75%,#fff6e8 100%);}
.ls{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  writing-mode:horizontal-tb;
  display:flex;flex-direction:column;
  background:linear-gradient(160deg,#F0F8FF 0%,#F0FFFF 35%,#F0FFF8 65%,#F8F0FF 100%);
}
.ls::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 30%,rgba(0,180,220,0.07) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 70%,rgba(0,180,220,0.04) 0%,transparent 50%);}
.glitch{position:absolute;inset:0;z-index:100;background:#F0FAFF;animation:glitchIn 0.8s ease forwards;pointer-events:none;}
@keyframes glitchIn{0%{opacity:1;}20%{transform:translateX(-6px);}30%{transform:translateX(4px);}45%{transform:none;opacity:1;}100%{opacity:0;}}
.header{flex-shrink:0;height:56px;display:flex;align-items:center;padding:0 20px;gap:14px;border-bottom:2px solid rgba(0,180,220,0.15);background:rgba(255,255,255,0.97);position:relative;z-index:10;}
.back-btn{font-family:'Orbitron',sans-serif;font-size:9px;color:#00CCFF;letter-spacing:0.1em;border:1.5px solid rgba(0,200,255,0.5);padding:4px 10px;border-radius:4px;background:rgba(0,200,255,0.06);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.header-title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(9px,2vh,14px);color:#1a0030;letter-spacing:0.2em;text-shadow:0 0 12px rgba(0,180,220,0.35);}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 20px;position:relative;z-index:10;scrollbar-width:none;}
.scroll-area::-webkit-scrollbar{display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
/* イントロ */
.intro-card{background:linear-gradient(135deg,rgba(0,180,220,0.07),rgba(255,255,255,0.65));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px;border:1.5px solid rgba(0,180,220,0.18);box-shadow:0 6px 24px rgba(0,180,220,0.1),inset 0 1px 0 rgba(255,255,255,0.9);padding:14px 16px;margin-bottom:12px;opacity:0;animation:fadeUp 0.5s ease 0.05s forwards;display:flex;align-items:center;gap:12px;}
.intro-icon{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(0,180,220,0.08);border-radius:10px;border:1px solid rgba(0,180,220,0.18);}
.intro-icon svg{width:20px;height:20px;}
.intro-text{font-family:'Noto Sans JP',sans-serif;font-size:11px;color:#1a0030;line-height:1.8;font-weight:400;}
/* ゲームリスト */
.section-label{font-family:'Orbitron',sans-serif;font-size:7px;color:rgba(0,180,220,0.8);letter-spacing:0.3em;margin-bottom:8px;}
.card{background:rgba(255,255,255,0.62);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px;border:1.5px solid rgba(255,255,255,0.85);box-shadow:0 6px 24px rgba(0,180,220,0.1),inset 0 1px 0 rgba(255,255,255,0.9);padding:14px;margin-bottom:10px;opacity:0;animation:fadeUp 0.5s ease forwards;}
.card:nth-child(1){animation-delay:0.12s;}.card:nth-child(2){animation-delay:0.2s;}
.game-list{display:flex;flex-direction:column;gap:8px;}
.game-item{display:flex;align-items:center;gap:10px;background:rgba(0,180,220,0.05);border-radius:10px;padding:10px 12px;border:1px solid rgba(0,180,220,0.12);}
.game-icon{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(0,180,220,0.08);border-radius:7px;border:1px solid rgba(0,180,220,0.15);}
.game-icon svg{width:16px;height:16px;}
.game-info{flex:1;}
.game-num{font-family:'Orbitron',sans-serif;font-size:7px;font-weight:900;color:rgba(0,180,220,0.5);letter-spacing:0.1em;margin-bottom:2px;}
.game-title{font-family:'Noto Sans JP',sans-serif;font-size:12px;color:#1a0030;font-weight:700;line-height:1.3;}
.game-genre{font-family:'Nunito',sans-serif;font-size:9px;color:rgba(0,160,200,0.7);letter-spacing:0.05em;margin-top:1px;}
.game-badge{flex-shrink:0;font-family:'Nunito',sans-serif;font-size:8px;border-radius:10px;padding:2px 7px;font-weight:700;background:rgba(0,180,220,0.1);color:rgba(0,140,180,0.9);border:1px solid rgba(0,180,220,0.25);}
.game-badge.console{background:rgba(140,60,220,0.08);color:rgba(120,50,200,0.85);border-color:rgba(140,60,220,0.2);}
</style>
<script>
(function(){
  if('ontouchstart' in window && window.screen.width<=1024) return;
  var PW=844, PH=390;
  function apply(){
    var ls=document.querySelector('.ls');
    if(!ls) return;
    var scale=Math.min((window.innerWidth-20)/PW,(window.innerHeight-20)/PH);
    var bg='linear-gradient(135deg,#fce8f8 0%,#e8f4ff 45%,#f8fff0 75%,#fff6e8 100%)';
    document.documentElement.style.cssText='margin:0;padding:0;width:100vw;height:100vh;display:flex;align-items:flex-start;justify-content:center;background:#000;overflow:hidden;';
    document.body.style.cssText='margin:0;padding:0;width:min(100vw,844px);height:390px;max-height:390px;overflow:hidden;position:relative;background:'+bg+';';
    ls.style.cssText=ls.style.cssText.replace(/position\s*:\s*[^;]+;?/g,'').replace(/top\s*:\s*[^;]+;?/g,'').replace(/left\s*:\s*[^;]+;?/g,'').replace(/width\s*:\s*[^;]+;?/g,'').replace(/height\s*:\s*[^;]+;?/g,'').replace(/transform\s*:\s*[^;]+;?/g,'').replace(/transform-origin\s*:\s*[^;]+;?/g,'');
    ls.style.position='absolute';ls.style.width='100%';ls.style.height='100%';
    ls.style.transform='none';
    ls.style.flexShrink='0';ls.style.overflow='hidden';
  }
  document.readyState==='loading'?document.addEventListener('DOMContentLoaded',apply):apply();
  window.addEventListener('resize',apply);
})();
</script>
<style>.ls{background:url('ポートフォリオ用　背景.png')center/cover no-repeat!important;}.ls::before{background:none!important;}</style>
</head>
<body>
<div class="ls">
  <div class="glitch"></div>
  <div class="header">
    <div class="back-btn" onclick="location.href='profile.html'" style="cursor:pointer;">◀ BACK</div>
    <div class="header-title">スマホ・GAME</div>
  </div>
  <div class="scroll-area">

    <!-- イントロ -->
    <div class="intro-card">
      <div class="intro-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(0,180,220,0.85)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="10" rx="5"/>
          <path d="M6 12h3M7.5 10.5v3"/>
          <circle cx="16" cy="11" r="1" fill="rgba(0,180,220,0.85)"/>
          <circle cx="18" cy="13" r="1" fill="rgba(0,180,220,0.85)"/>
        </svg>
      </div>
      <div class="intro-text">あたしの推しGAMEを紹介します。</div>
    </div>

    <!-- スマホゲーム -->
    <div class="section-label">SMARTPHONE GAME</div>
    <div class="card">
      <div class="game-list">

        <div class="game-item">
          <div class="game-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(0,180,220,0.8)" stroke-width="1.8" stroke-linecap="round">
              <rect x="5" y="2" width="14" height="20" rx="2"/>
              <path d="M12 18h.01"/>
            </svg>
          </div>
          <div class="game-info">
            <div class="game-num">01</div>
            <div class="game-title">呪術廻戦ファンパレ</div>
            <div class="game-genre">スマホ / RPG</div>
          </div>
          <div class="game-badge">スマホ</div>
        </div>

        <div class="game-item">
          <div class="game-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(0,180,220,0.8)" stroke-width="1.8" stroke-linecap="round">
              <rect x="5" y="2" width="14" height="20" rx="2"/>
              <path d="M12 18h.01"/>
            </svg>
          </div>
          <div class="game-info">
            <div class="game-num">02</div>
            <div class="game-title">怪獣８号</div>
            <div class="game-genre">スマホ / アクション</div>
          </div>
          <div class="game-badge">スマホ</div>
        </div>

      </div>
    </div>

    <!-- コンソールゲーム -->
    <div class="section-label">CONSOLE GAME</div>
    <div class="card">
      <div class="game-list">

        <div class="game-item">
          <div class="game-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(140,60,220,0.8)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="10" rx="5"/>
              <path d="M6 12h3M7.5 10.5v3"/>
              <circle cx="16" cy="11" r="1" fill="rgba(140,60,220,0.8)"/>
              <circle cx="18" cy="13" r="1" fill="rgba(140,60,220,0.8)"/>
            </svg>
          </div>
          <div class="game-info">
            <div class="game-num">03</div>
            <div class="game-title">無双OROCHIシリーズ</div>
            <div class="game-genre">コンソール / アクション</div>
          </div>
          <div class="game-badge console">コンソール</div>
        </div>

        <div class="game-item">
          <div class="game-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(140,60,220,0.8)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="10" rx="5"/>
              <path d="M6 12h3M7.5 10.5v3"/>
              <circle cx="16" cy="11" r="1" fill="rgba(140,60,220,0.8)"/>
              <circle cx="18" cy="13" r="1" fill="rgba(140,60,220,0.8)"/>
            </svg>
          </div>
          <div class="game-info">
            <div class="game-num">04</div>
            <div class="game-title">龍が如くシリーズ</div>
            <div class="game-genre">コンソール / アドベンチャー</div>
          </div>
          <div class="game-badge console">コンソール</div>
        </div>

      </div>
    </div>

  </div>
</div>
</body>
</html>

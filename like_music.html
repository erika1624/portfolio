<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Music</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{width:100vw;height:100vh;display:flex;align-items:flex-start;justify-content:center;background:#000;overflow:hidden;}
body{width:min(100vw,844px);height:390px;max-height:390px;overflow:hidden;position:relative;background:linear-gradient(135deg,#fce8f8 0%,#e8f4ff 45%,#f8fff0 75%,#fff6e8 100%);}
.ls{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  writing-mode:horizontal-tb;
  display:flex;flex-direction:column;
  background:linear-gradient(160deg,#FFFBF0 0%,#FFF8E8 35%,#FFFFF0 65%,#FFF5E8 100%);
}
.ls::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 30%,rgba(200,160,0,0.06) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 70%,rgba(200,160,0,0.04) 0%,transparent 50%);}
.glitch{position:absolute;inset:0;z-index:100;background:#FFFDF0;animation:glitchIn 0.8s ease forwards;pointer-events:none;}
@keyframes glitchIn{0%{opacity:1;}20%{transform:translateX(-6px);}30%{transform:translateX(4px);}45%{transform:none;opacity:1;}100%{opacity:0;}}
.header{flex-shrink:0;height:56px;display:flex;align-items:center;padding:0 20px;gap:14px;border-bottom:2px solid rgba(200,160,0,0.15);background:rgba(255,255,255,0.97);position:relative;z-index:10;}
.back-btn{font-family:'Orbitron',sans-serif;font-size:9px;color:#00CCFF;letter-spacing:0.1em;border:1.5px solid rgba(0,200,255,0.5);padding:4px 10px;border-radius:4px;background:rgba(0,200,255,0.06);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.header-title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(9px,2vh,14px);color:#1a0030;letter-spacing:0.2em;text-shadow:0 0 12px rgba(200,160,0,0.35);}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 20px;position:relative;z-index:10;scrollbar-width:none;}
.scroll-area::-webkit-scrollbar{display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
/* イントロ */
.intro-card{background:linear-gradient(135deg,rgba(200,160,0,0.08),rgba(255,255,255,0.65));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px;border:1.5px solid rgba(200,160,0,0.2);box-shadow:0 6px 24px rgba(200,160,0,0.12),inset 0 1px 0 rgba(255,255,255,0.9);padding:14px 16px;margin-bottom:12px;opacity:0;animation:fadeUp 0.5s ease 0.05s forwards;display:flex;align-items:center;gap:12px;}
.intro-icon{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(200,160,0,0.08);border-radius:10px;border:1px solid rgba(200,160,0,0.2);}
.intro-icon svg{width:20px;height:20px;}
.intro-text{font-family:'Noto Sans JP',sans-serif;font-size:11px;color:#1a0030;line-height:1.8;font-weight:400;}
/* セクション */
.section-label{font-family:'Orbitron',sans-serif;font-size:7px;color:rgba(200,160,0,0.85);letter-spacing:0.3em;margin-bottom:8px;}
/* アーティストカード */
.card{background:rgba(255,255,255,0.62);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px;border:1.5px solid rgba(255,255,255,0.85);box-shadow:0 6px 24px rgba(200,160,0,0.1),inset 0 1px 0 rgba(255,255,255,0.9);padding:14px;margin-bottom:10px;opacity:0;animation:fadeUp 0.5s ease 0.12s forwards;}
.artist-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;}
.artist-item{background:rgba(200,160,0,0.06);border-radius:10px;padding:9px 6px 8px;border:1px solid rgba(200,160,0,0.15);text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;}
.artist-item.special{background:rgba(220,80,120,0.07);border-color:rgba(220,80,120,0.22);}
.artist-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.artist-icon svg{width:16px;height:16px;}
.artist-name{font-family:'Noto Sans JP',sans-serif;font-size:10px;color:#1a0030;font-weight:700;line-height:1.3;}
.artist-genre{font-family:'Nunito',sans-serif;font-size:8px;color:rgba(170,130,0,0.75);letter-spacing:0.03em;}
.special-tag{font-family:'Nunito',sans-serif;font-size:7px;font-weight:700;color:rgba(200,60,100,0.9);background:rgba(220,80,120,0.1);border-radius:8px;padding:1px 5px;border:1px solid rgba(220,80,120,0.2);margin-top:1px;}
</style>
<script>
(function(){
  if('ontouchstart' in window && window.screen.width<=1024) return;
  var PW=844, PH=390;
  function apply(){
    var ls=document.querySelector('.ls');
    if(!ls) return;
    var scale=Math.min((window.innerWidth-20)/PW,(window.innerHeight-20)/PH);
    var bg='linear-gradient(135deg,#fce8f8 0%,#e8f4ff 45%,#f8fff0 75%,#fff6e8 100%)';
    document.documentElement.style.cssText='margin:0;padding:0;width:100vw;height:100vh;display:flex;align-items:flex-start;justify-content:center;background:#000;overflow:hidden;';
    document.body.style.cssText='margin:0;padding:0;width:min(100vw,844px);height:390px;max-height:390px;overflow:hidden;position:relative;background:'+bg+';';
    ls.style.cssText=ls.style.cssText.replace(/position\s*:\s*[^;]+;?/g,'').replace(/top\s*:\s*[^;]+;?/g,'').replace(/left\s*:\s*[^;]+;?/g,'').replace(/width\s*:\s*[^;]+;?/g,'').replace(/height\s*:\s*[^;]+;?/g,'').replace(/transform\s*:\s*[^;]+;?/g,'').replace(/transform-origin\s*:\s*[^;]+;?/g,'');
    ls.style.position='absolute';ls.style.width='100%';ls.style.height='100%';
    ls.style.transform='none';
    ls.style.flexShrink='0';ls.style.overflow='hidden';
  }
  document.readyState==='loading'?document.addEventListener('DOMContentLoaded',apply):apply();
  window.addEventListener('resize',apply);
})();
</script>
<style>.ls{background:url('ポートフォリオ用_背景.png')center/cover no-repeat!important;}.ls::before{background:none!important;}</style>
</head>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON BEAT — MUSIC SELECT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{width:100vw;height:100vh;display:flex;align-items:flex-start;justify-content:center;background:#000;overflow:hidden;}
body{width:min(100vw,844px);height:390px;max-height:390px;overflow:hidden;position:relative;background:linear-gradient(135deg,#fce8f8 0%,#e8f4ff 45%,#f8fff0 75%,#fff6e8 100%);font-family:'Orbitron',monospace;}
/* ── デコ丸 ── */
.deco{display:none!important;}
.deco.d1{width:52px;height:52px;border:2px solid rgba(255,150,220,.55);top:8%;right:3%;}
.deco.d2{width:28px;height:28px;border:2px solid rgba(80,200,255,.55);top:22%;left:2%;animation-delay:.8s;opacity:.65;}
.deco.d3{width:20px;height:20px;border:2px solid rgba(255,220,60,.55);bottom:22%;right:8%;animation-delay:.4s;opacity:.7;}
.deco.d4{width:38px;height:38px;border:1.5px solid rgba(200,150,255,.50);bottom:8%;left:3%;animation-delay:1.2s;opacity:.5;}
.deco.d5{width:16px;height:16px;border:1.5px solid rgba(80,220,200,.50);top:62%;left:36%;animation-delay:2s;opacity:.4;}
@keyframes decoFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

/* ── Canvas layers ── */
#gc      {position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;}
#gc-rings{position:absolute;top:0;left:0;width:100%;height:100%;z-index:6;pointer-events:none;}
#gc-front{position:absolute;top:0;left:0;width:100%;height:100%;z-index:16;pointer-events:none;}

/* ══════════════════════════════════════
   TOP CYBER FRAME
══════════════════════════════════════ */
.top-frame{
  position:absolute;top:0;left:0;width:100%;height:44px;z-index:22;
  background:linear-gradient(90deg,rgba(255,220,245,.88),rgba(230,220,255,.85),rgba(215,238,255,.88));
  border-bottom:2px solid rgba(0,200,200,.45);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;padding:0 10px 0 46px;gap:6px;
  box-shadow:
    0 3px 18px rgba(0,220,200,.30),
    0 2px 40px rgba(255,60,180,.18),
    inset 0 -1px 0 rgba(0,255,208,.12);
}
/* Scan line animation across top frame */
.top-frame::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(90deg,
    transparent 0%,transparent 42%,
    rgba(0,255,208,.06) 48%,rgba(0,255,208,.14) 50%,rgba(0,255,208,.06) 52%,
    transparent 58%,transparent 100%);
  animation:scanSlide 4s linear infinite;
  pointer-events:none;
}
@keyframes scanSlide{
  0%{transform:translateX(-100%);}100%{transform:translateX(100%);}
}
/* Corner accent lines under top frame */
.top-frame::after{
  content:'';position:absolute;bottom:-1px;left:0;width:100%;height:1px;
  background:linear-gradient(90deg,#00ffd0 0%,#00ffd0 15%,transparent 30%,transparent 70%,#ff5db8 85%,#ff5db8 100%);
  opacity:.70;
}

/* Status bar elements */
.sb-player{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.55);border:1px solid rgba(0,200,180,.30);border-radius:20px;padding:3px 8px 3px 4px;}
.sb-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#00ffd0,#ff5db8);border:1.5px solid rgba(0,230,200,.60);display:flex;align-items:center;justify-content:center;font-size:11px;box-shadow:0 0 8px rgba(0,220,180,.50);}
.sb-lv{font-size:8px;font-weight:700;background:linear-gradient(90deg,#00ffd0,#aaffee);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.sb-lv span{font-size:10px;font-weight:900;}
.sb-stamina{display:flex;align-items:center;gap:4px;flex:1;background:rgba(255,255,255,.55);border:1px solid rgba(0,200,180,.25);border-radius:20px;padding:2px 8px;}
.sb-sta-icon{font-size:10px;filter:drop-shadow(0 0 4px rgba(0,220,200,.9));}
.sb-sta-bar-wrap{flex:1;height:6px;background:rgba(0,0,0,.55);border-radius:4px;overflow:hidden;}
.sb-sta-bar{height:100%;width:75%;border-radius:4px;background:linear-gradient(90deg,#00c8a0,#00ffd0,#7affee);animation:staPulse 2s ease-in-out infinite;}
@keyframes staPulse{0%,100%{box-shadow:0 0 5px rgba(0,220,200,.60);}50%{box-shadow:0 0 11px rgba(0,220,200,1);}}
.sb-sta-txt{font-family:'Share Tech Mono',monospace;font-size:7px;color:rgba(0,230,200,.72);white-space:nowrap;}
.sb-gems{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.55);border:1px solid rgba(180,100,255,.30);border-radius:20px;padding:2px 7px;box-shadow:0 0 8px rgba(180,100,255,.15);}
.sb-gem-icon{font-size:10px;filter:drop-shadow(0 0 5px rgba(180,100,255,.95));}
.sb-gem-val{font-size:9px;font-weight:700;background:linear-gradient(90deg,#cc88ff,#fff,#cc88ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.sb-settings{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.55);border:1px solid rgba(0,200,180,.30);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:transform .2s;}
.sb-settings:hover{transform:rotate(45deg);}

/* ── Screen corner brackets ── */
.corner{position:absolute;width:14px;height:14px;z-index:21;pointer-events:none;}
.corner.tl{top:44px;left:0; border-top:2px solid #00ffd0;border-left:2px solid #00ffd0;}
.corner.tr{top:44px;right:0;border-top:2px solid #ff5db8;border-right:2px solid #ff5db8;}
.corner.bl{bottom:48px;left:0; border-bottom:2px solid #00ffd0;border-left:2px solid #00ffd0;}
.corner.br{bottom:48px;right:0;border-bottom:2px solid #ff5db8;border-right:2px solid #ff5db8;}

/* ── Side edge glow lines ── */
.side-line{position:absolute;top:58px;bottom:62px;width:1.5px;z-index:12;pointer-events:none;}
.side-line.l{left:0;background:linear-gradient(180deg,#00ffd0,rgba(0,255,208,.10) 70%,transparent);}
.side-line.r{right:0;background:linear-gradient(180deg,#ff5db8,rgba(255,93,184,.10) 70%,transparent);}

/* ══════════════════════════════════════
   LIZ — left side, dominant, large
══════════════════════════════════════ */
.liz-area{
  position:absolute;
  bottom:48px;left:-4%;
  width:52%;height:calc(100% - 44px - 48px);
  z-index:3;
  pointer-events:none;overflow:visible;
  display:flex;align-items:flex-end;justify-content:center;
}
.liz-img{
  height:100%;width:auto;object-fit:contain;
  mix-blend-mode:normal;
  filter:
    drop-shadow(0 0 28px rgba(255,90,180,.68))
    drop-shadow(0 0 55px rgba(0,220,200,.45))
    brightness(1.05);
  animation:lizBob 3.5s ease-in-out infinite;
  transform-origin:bottom center;
}
@keyframes lizBob{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-8px) scale(1.015);}
}

/* ── LIZ foot shadow + mint floor reflection ── */
.liz-shadow{
  position:absolute;
  bottom:1px;left:5%;width:82%;height:18px;
  background:radial-gradient(ellipse at 48% 100%, rgba(0,0,0,.55) 0%, transparent 72%);
  transform:scaleY(.45);
  pointer-events:none;
}
.liz-reflect{
  position:absolute;
  bottom:0;left:-8%;width:108%;height:52px;
  background:radial-gradient(ellipse at 50% 0%,
    rgba(0,255,208,.28) 0%,
    rgba(0,200,180,.10) 38%,
    transparent 72%);
  pointer-events:none;
  animation:reflectPulse 3.5s ease-in-out infinite;
}
@keyframes reflectPulse{
  0%,100%{opacity:.7;}
  50%{opacity:1;}
}

/* ══════════════════════════════════════
   CAROUSEL AREA
══════════════════════════════════════ */
.carousel-area{
  position:absolute;
  bottom:48px;left:0;width:100%; /* 全幅 — %計算をW()と一致させる */
  height:260px;z-index:5;
  overflow:visible;
}
.carousel-track{
  position:absolute;bottom:0;left:0;width:100%;height:100%;
  overflow:visible;
}

/* Card base */
.c-card{
  position:absolute;bottom:22px;
  transform-origin:bottom center;cursor:pointer;
  border-radius:12px;overflow:hidden;
  transition:
    left .50s cubic-bezier(.32,1.08,.60,1),
    width .50s cubic-bezier(.32,1.08,.60,1),
    height .50s cubic-bezier(.32,1.08,.60,1),
    bottom .50s cubic-bezier(.32,1.08,.60,1),
    opacity .40s ease,filter .40s ease,
    transform .50s cubic-bezier(.32,1.08,.60,1),
    box-shadow .40s ease;
}
.c-card img{width:100%;height:100%;object-fit:cover;display:block;}

/* ── カルーセル配置 — 中心45% (ノア17%右・差パネル左70%の中間) ── */
/* Far left — ノアの後ろで半非表示 */
.c-pos-0{
  left:calc(45% - 290px);
  width:72px;height:72px;bottom:48px;
  opacity:.18;filter:blur(3.5px) brightness(.38);
  transform:perspective(700px) rotateY(52deg) translateZ(-100px);
  z-index:1;border-radius:8px;
}
/* Left — ノアのすぐ右 */
.c-pos-1{
  left:calc(45% - 210px);
  width:118px;height:118px;bottom:36px;
  opacity:.52;filter:blur(1.5px) brightness(.62);
  transform:perspective(700px) rotateY(40deg) translateZ(-65px) scale(.92);
  z-index:2;border-radius:11px;
  box-shadow:0 0 12px rgba(255,60,180,.22),0 6px 22px rgba(0,0,0,.60);
}
/* CENTER — hero (45% center) */
.c-pos-2{
  left:calc(45% - 100px);
  width:200px;height:200px;bottom:16px;
  opacity:1;filter:blur(0) brightness(1.08);
  transform:perspective(700px) translateZ(60px) scale(1);
  z-index:4;
  border:2.5px solid rgba(255,255,255,.55);
  border-radius:14px;
  animation:rainbowGlow 4s linear infinite;
}
@keyframes rainbowGlow{
  0%  {box-shadow:0 0 38px rgba(255,30,90,.90), 0 0 75px rgba(255,30,90,.60), 0 12px 48px rgba(0,0,0,.80);}
  16% {box-shadow:0 0 38px rgba(255,140,0,.90), 0 0 75px rgba(255,140,0,.60), 0 12px 48px rgba(0,0,0,.80);}
  33% {box-shadow:0 0 38px rgba(240,220,0,.90), 0 0 75px rgba(240,220,0,.60), 0 12px 48px rgba(0,0,0,.80);}
  50% {box-shadow:0 0 38px rgba(0,210,80,.90),  0 0 75px rgba(0,210,80,.60),  0 12px 48px rgba(0,0,0,.80);}
  67% {box-shadow:0 0 38px rgba(0,150,255,.90), 0 0 75px rgba(0,150,255,.60), 0 12px 48px rgba(0,0,0,.80);}
  83% {box-shadow:0 0 38px rgba(255,30,90,.90), 0 0 75px rgba(255,30,90,.60), 0 12px 48px rgba(0,0,0,.80);}
  100%{box-shadow:0 0 38px rgba(255,30,90,.90), 0 0 75px rgba(255,30,90,.60), 0 12px 48px rgba(0,0,0,.80);}
}
/* Right */
.c-pos-3{
  left:calc(45% + 100px);
  width:118px;height:118px;bottom:36px;
  opacity:.52;filter:blur(1.5px) brightness(.62);
  transform:perspective(700px) rotateY(-40deg) translateZ(-65px) scale(.92);
  z-index:2;border-radius:11px;
  box-shadow:0 0 12px rgba(0,220,200,.22),0 6px 22px rgba(0,0,0,.60);
}
/* Far right — 難易度パネルの後ろに隠れる */
.c-pos-4{
  left:calc(45% + 218px);
  width:72px;height:72px;bottom:48px;
  opacity:.18;filter:blur(3.5px) brightness(.38);
  transform:perspective(700px) rotateY(-52deg) translateZ(-100px);
  z-index:1;border-radius:8px;
}

/* Center card shimmer */
.c-pos-2::after{
  content:'';position:absolute;top:0;left:-90%;width:48%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
  animation:jkShimmer 4s linear infinite;pointer-events:none;
}
@keyframes jkShimmer{0%{left:-90%;}100%{left:170%;}}

/* GASHAN — slam-in animation for new center card */
@keyframes gashan{
  0%{
    transform:perspective(700px) translateZ(-320px) scale(.28) rotateX(10deg);
    opacity:0;filter:blur(8px) brightness(.20);
  }
  62%{
    transform:perspective(700px) translateZ(88px) scale(1.08);
    opacity:1;filter:blur(0) brightness(1.18);
  }
  80%{transform:perspective(700px) translateZ(50px) scale(1.02);}
  100%{transform:perspective(700px) translateZ(60px) scale(1);filter:blur(0) brightness(1.08);}
}

/* Nav arrows — 光沢シルバー */
@keyframes navGlow{
  0%,100%{box-shadow:0 0 8px rgba(0,220,200,.55),0 0 18px rgba(0,200,255,.30),inset 0 0 6px rgba(0,255,208,.12);}
  50%{box-shadow:0 0 14px rgba(0,240,220,.90),0 0 30px rgba(0,210,255,.55),0 0 48px rgba(0,200,255,.22),inset 0 0 10px rgba(0,255,208,.20);}
}
.carousel-nav{
  position:absolute;z-index:8;
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(rgba(0,8,18,.88),rgba(0,8,18,.88)) padding-box,
             linear-gradient(135deg,#00ffd0,#00b8ff,#00ffd0) border-box;
  border:1.5px solid transparent;
  cursor:pointer;
  box-shadow:0 0 8px rgba(0,220,200,.55),0 0 18px rgba(0,200,255,.30),inset 0 0 6px rgba(0,255,208,.12);
  animation:navGlow 2.2s ease-in-out infinite;
  transition:transform .18s;
  font-size:18px;
  font-family:'Orbitron',monospace;
  color:#00ffd0;
  filter:drop-shadow(0 0 4px rgba(0,255,208,.80));
  bottom:135px;
}
.carousel-nav:hover{
  transform:scale(1.18);
  filter:drop-shadow(0 0 8px rgba(0,255,208,1));
}
.nav-left{left:6px;}
.nav-right{right:calc(30% + 8px);} /* 難易度パネル左端のすぐ外 */

/* Song dots */
.song-dots{
  position:absolute;bottom:52px;left:45%;transform:translateX(-50%);
  z-index:8;display:flex;gap:6px;align-items:center;
}
.song-dot{width:5px;height:5px;border-radius:50%;background:rgba(0,200,180,.25);transition:all .30s;}
.song-dot.active{background:#00ffd0;box-shadow:0 0 9px rgba(0,255,208,.90);width:16px;border-radius:3px;}

/* ══════════════════════════════════════
   DIFF PANEL — 難易度選択（右側固定）
══════════════════════════════════════ */
.diff-panel{
  position:absolute;
  top:46px;right:0;bottom:48px;
  width:30%;
  z-index:10;
  display:flex;flex-direction:column;
  padding:8px 6px 8px 4px;
  gap:5px;
}

/* 曲名エリア */
.dp-song-title{
  font-family:'Orbitron',monospace;font-weight:900;font-size:10px;
  letter-spacing:.06em;text-align:center;
  color:#00eedd;
  text-shadow:0 0 8px rgba(0,220,200,.70);
  line-height:1.3;flex-shrink:0;
}
.dp-song-en{
  font-family:'Share Tech Mono',monospace;font-size:6px;
  letter-spacing:.18em;text-align:center;
  color:rgba(0,200,180,.55);margin-top:2px;flex-shrink:0;
}

/* 「難易度を選択」ラベル */
.dp-label{
  font-family:'Orbitron',monospace;font-weight:900;font-size:7px;
  letter-spacing:.18em;text-align:center;flex-shrink:0;
  color:rgba(200,230,255,.50);
  display:flex;align-items:center;gap:5px;
}
.dp-label::before,.dp-label::after{content:'';flex:1;height:1px;background:rgba(0,200,220,.22);}

/* 3つの難易度ボタン */
.diff-btn-wrap{
  display:flex;flex-direction:column;gap:5px;flex:1;
}

@keyframes diffBtnGlow{
  0%,100%{box-shadow:var(--glow-a);}
  50%{box-shadow:var(--glow-b);}
}

.diff-btn{
  flex:1;border-radius:10px;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  padding:0 10px;
  border:2px solid transparent;
  position:relative;overflow:hidden;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),
             border-color .18s,background .18s,opacity .18s;
  opacity:.62;
  -webkit-tap-highlight-color:transparent;
}
.diff-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(255,255,255,.06) 0%,transparent 60%);
  pointer-events:none;
}
/* shimmer sweep */
.diff-btn::after{
  content:'';position:absolute;top:0;left:-80%;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  pointer-events:none;opacity:0;
  transition:opacity .2s;
}
.diff-btn.active::after{opacity:1;animation:diffShimmer 2s linear infinite;}
@keyframes diffShimmer{0%{left:-80%;}100%{left:160%;}}

/* EASY */
.diff-btn.diff-easy{
  background:linear-gradient(135deg,rgba(0,180,80,.18),rgba(0,120,50,.12));
  --glow-a:0 0 10px rgba(0,200,80,.30),0 2px 10px rgba(0,0,0,.40);
  --glow-b:0 0 20px rgba(0,240,100,.55),0 2px 10px rgba(0,0,0,.40),inset 0 0 12px rgba(0,200,80,.12);
}
.diff-btn.diff-easy.active{
  background:linear-gradient(135deg,rgba(0,210,90,.28),rgba(0,160,60,.18));
  border-color:rgba(0,220,80,.70);opacity:1;
  transform:scale(1.03) translateX(-3px);
  animation:diffBtnGlow 1.4s ease-in-out infinite;
}
.diff-btn.diff-easy:not(.active):hover{opacity:.85;transform:scale(1.01);}

/* NORMAL */
.diff-btn.diff-normal{
  background:linear-gradient(135deg,rgba(0,160,255,.18),rgba(0,100,200,.12));
  --glow-a:0 0 10px rgba(0,180,255,.30),0 2px 10px rgba(0,0,0,.40);
  --glow-b:0 0 20px rgba(0,220,255,.55),0 2px 10px rgba(0,0,0,.40),inset 0 0 12px rgba(0,180,255,.12);
}
.diff-btn.diff-normal.active{
  background:linear-gradient(135deg,rgba(0,190,255,.28),rgba(0,130,220,.18));
  border-color:rgba(0,210,255,.70);opacity:1;
  transform:scale(1.03) translateX(-3px);
  animation:diffBtnGlow 1.4s ease-in-out infinite;
}
.diff-btn.diff-normal:not(.active):hover{opacity:.85;transform:scale(1.01);}

/* HARD */
.diff-btn.diff-hard{
  background:linear-gradient(135deg,rgba(255,40,140,.18),rgba(180,10,80,.12));
  --glow-a:0 0 10px rgba(255,40,140,.30),0 2px 10px rgba(0,0,0,.40);
  --glow-b:0 0 20px rgba(255,60,160,.55),0 2px 10px rgba(0,0,0,.40),inset 0 0 12px rgba(255,40,130,.12);
}
.diff-btn.diff-hard.active{
  background:linear-gradient(135deg,rgba(255,50,150,.28),rgba(200,20,90,.18));
  border-color:rgba(255,60,160,.70);opacity:1;
  transform:scale(1.03) translateX(-3px);
  animation:diffBtnGlow 1.4s ease-in-out infinite;
}
.diff-btn.diff-hard:not(.active):hover{opacity:.85;transform:scale(1.01);}

/* 難易度アイコン（星のリング） */
.diff-icon{
  width:42px;height:42px;border-radius:50%;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.diff-icon-ring{
  position:absolute;inset:0;border-radius:50%;border:1.5px solid;
  animation:dcCW 3.5s linear infinite;
}
.diff-icon-ring2{
  position:absolute;inset:5px;border-radius:50%;border:1px dashed;
  animation:dcCCW 2.5s linear infinite;
}
@keyframes dcCW{from{transform:rotate(0);}to{transform:rotate(360deg);}}
@keyframes dcCCW{from{transform:rotate(0);}to{transform:rotate(-360deg);}}

.diff-easy  .diff-icon-ring {border-color:rgba(0,220,80,.70);}
.diff-easy  .diff-icon-ring2{border-color:rgba(0,200,80,.40);}
.diff-easy  .diff-icon{background:radial-gradient(circle,rgba(0,200,80,.25),rgba(0,150,60,.10));}
.diff-easy.active .diff-icon-ring {border-color:rgba(0,240,100,1);}
.diff-easy.active .diff-icon-ring2{border-color:rgba(0,220,100,.70);}

.diff-normal .diff-icon-ring {border-color:rgba(0,190,255,.70);}
.diff-normal .diff-icon-ring2{border-color:rgba(0,170,255,.40);}
.diff-normal .diff-icon{background:radial-gradient(circle,rgba(0,180,255,.25),rgba(0,130,220,.10));}
.diff-normal.active .diff-icon-ring {border-color:rgba(0,220,255,1);}
.diff-normal.active .diff-icon-ring2{border-color:rgba(0,200,255,.70);}

.diff-hard  .diff-icon-ring {border-color:rgba(255,40,140,.70);}
.diff-hard  .diff-icon-ring2{border-color:rgba(255,60,160,.40);}
.diff-hard  .diff-icon{background:radial-gradient(circle,rgba(255,40,140,.25),rgba(200,10,90,.10));}
.diff-hard.active .diff-icon-ring {border-color:rgba(255,80,170,1);}
.diff-hard.active .diff-icon-ring2{border-color:rgba(255,60,160,.70);}

<script>
/* ══════════ Song Data ══════════ */
const ALL_SONGS = [
  /* ── RIZ セット (index 0-2) ── */
  {

    jacket:'星空のメロディ　ジャケ写.png', badge:false,

    type:'duo', char:'riz'
  },
  {
    title:'サイバー・パルス', en:'CYBER PULSE', genre:'TECHNO', bpm:175, dur:'3:28',
    levels:[9,16,22], scores:['—','—','421,680'], ranks:['—','—','D'],
    jacket:'サイバー・パルス　ジャケ写.png', badge:true,
    themeA:[0,230,80], themeB:[255,200,60],
    type:'luna', char:'riz'
  },
  /* ── LUNA セット (index 3-5) ── */
  {
    title:'CYBER KISS CRASH', en:'CYBER KISS CRASH', genre:'DARK POP', bpm:128, dur:'3:55',
    levels:[6,12,20], scores:['—','—','—'], ranks:['—','—','—'],
    jacket:'CYBER KISS CRASH　ジャケ写.png', badge:true,
    themeA:[180,0,255], themeB:[255,0,120],
    type:'luna', char:'luna'
  },
  {
    title:'Midnight Glitch Love', en:'MIDNIGHT GLITCH LOVE', genre:'GLITCH', bpm:115, dur:'4:08',
    levels:[5,11,18], scores:['—','—','—'], ranks:['—','—','—'],
    jacket:'Midnight Glitch Love　ジャケ写.png', badge:false,
    themeA:[100,0,220], themeB:[0,180,255],
    type:'luna', char:'luna'
  },
  {
    title:'Lipstick Logic', en:'LIPSTICK LOGIC', genre:'ELECTRO', bpm:145, dur:'3:30',
    levels:[8,15,22], scores:['—','—','—'], ranks:['—','—','—'],
    jacket:'Lipstick Logic　ジャケ写.png', badge:true,
    themeA:[255,0,80], themeB:[180,0,255],
    type:'luna', char:'luna'
  }
];
/* ── DUO 限定曲（全6曲クリアで解放） ── */
ALL_SONGS.push({
  title:'Symphony of Dawn -二人の約束-',
  en:'SYMPHONY OF DAWN',
  genre:'DUO', bpm:120, dur:'5:12',
  levels:[8,15,22],
  scores:['—','—','—'], ranks:['—','—','—'],
  jacket:'Symphony_of_Dawn_-二人の約束-.png', badge:true,
  themeA:[255,110,170], themeB:[220,160,0],
  type:'duo', char:'duo'
});

const RIZ_SONGS  = ALL_SONGS.slice(0,3);
const LUNA_SONGS = ALL_SONGS.slice(3,6);
const DUO_SONGS  = ALL_SONGS.slice(6,7);

let curChar = 0;  /* 0=RIZ / 1=LUNA / 2=DUO */
let curSong = 0, curDiff = 1;

function getSongs(){
  if(curChar===0) return RIZ_SONGS;
  if(curChar===1) return LUNA_SONGS;
  return DUO_SONGS;
}
function globalIdx(){
  if(curChar===2) return 6+curSong;
  return curChar*3+curSong;
}

/* ── DUO 解放チェック ── */
function isAllSongsPlayed(){
  const played=JSON.parse(localStorage.getItem('playedSongs')||'[]');
  return [0,1,2,3,4,5].every(i=>played.includes(i));
}

/* ── ロックトースト表示 ── */
function showLockToast(){
  document.querySelectorAll('.lock-toast').forEach(el=>el.remove());
  const played=JSON.parse(localStorage.getItem('playedSongs')||'[]');
  const remaining=[0,1,2,3,4,5].filter(i=>!played.includes(i)).length;
  const toast=document.createElement('div');
  toast.className='lock-toast';
  toast.innerHTML=
    '<div class="lock-toast-icon">🔒</div>'+
    '<div class="lock-toast-title">LOCKED</div>'+
    '<div class="lock-toast-sub">リズ＆ルナ 全6曲をクリアすると解放</div>'+
    '<div class="lock-toast-remain">残り '+remaining+' 曲</div>';
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),2900);
}

/* ── DUOタブの解放状態を反映 ── */
function updateDuoTabState(){
  const tab=document.getElementById('duoTab');
  if(!tab) return;
  if(isAllSongsPlayed()){
    tab.classList.remove('locked');
  } else {
    tab.classList.add('locked');
  }
}

/* ── ナビ矢印の表示制御 ── */
function updateNavVisibility(){
  const hide=getSongs().length<=1;
  document.querySelectorAll('.carousel-nav').forEach(n=>{
    n.style.visibility=hide?'hidden':'visible';
  });
}

/* Theme lerp */
let tA=[255,60,180], tB=[0,220,200];
let gA=[255,60,180], gB=[0,220,200];
function lerpTheme(){
  const sp=.058;
  tA=tA.map((v,i)=>v+(gA[i]-v)*sp);
  tB=tB.map((v,i)=>v+(gB[i]-v)*sp);
}
function applyTheme(id){
  const s=ALL_SONGS[id];
  if(!s) return;
  gA=[...s.themeA]; gB=[...s.themeB];
  const f=document.getElementById('flash');
  f.style.background=`rgba(${s.themeA.join(',')},0.14)`;
  f.style.opacity='1';
  setTimeout(()=>f.style.opacity='0',120);
}

/* Build carousel — リビルド可能 */
const track=document.getElementById('carouselTrack');
const dotsEl=document.getElementById('songDots');
let cards=[], dots=[];

function rebuildDots(){
  dotsEl.innerHTML=''; dots=[];
  getSongs().forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='song-dot'+(i===curSong?' active':'');
    dotsEl.appendChild(d); dots.push(d);
  });
}

function rebuildCarousel(){
  track.innerHTML=''; cards=[];
  getSongs().forEach((s,i)=>{
    const card=document.createElement('div');
    card.className='c-card';
    card.innerHTML=`<img src="${s.jacket}" alt="${s.title}" loading="eager">`;
    card.addEventListener('click',()=>cardClick(i));
    track.appendChild(card); cards.push(card);
  });
  rebuildDots();
  updateCarousel(false);
  updateNavVisibility();
}

rebuildCarousel();

/* ウェーブフォームバーを生成 */
(function(){
  const wf=document.getElementById('scoreWaveform');
  if(!wf)return;
  const colA='rgba(200,175,120,.75)',colB='rgba(255,80,180,.75)';
  for(let i=0;i<28;i++){
    const b=document.createElement('div');
    b.className='swf-bar';
    b.style.height=(10+Math.random()*22)+'px';
    b.style.background=i<15?colA:colB;
    b.style.animationDelay=(Math.random()*2)+'s';
    b.style.animationDuration=(.8+Math.random()*.8)+'s';
    wf.appendChild(b);
  }
})();

function posClass(idx){
  const total=getSongs().length;
  if(total===1) return 'c-pos-2';
  const d=(idx-curSong+total)%total;
  if(d===0)       return 'c-pos-2';
  if(d===1)       return 'c-pos-3';
  if(d===total-1) return 'c-pos-1';
  if(d===2)       return 'c-pos-4';
  return 'c-pos-0';
}

function updateCarousel(doAnim){
  cards.forEach((card,i)=>{
    const pc=posClass(i);
    card.className='c-card '+pc;
    if(doAnim && i===curSong){
      card.style.animation='none';
      void card.offsetWidth;
      card.style.animation='gashan .58s cubic-bezier(.22,.68,.42,1.28) forwards';
      card.addEventListener('animationend',()=>{ card.style.animation=''; },{once:true});
    }
  });
  dots.forEach((d,i)=>d.classList.toggle('active',i===curSong));
}

function navigate(dir){
  const total=getSongs().length;
  curSong=(curSong+dir+total)%total;
  updateCarousel(true); updateInfo(); applyTheme(globalIdx());
  playSongPreview(globalIdx());
}

function cardClick(idx){
  const total=getSongs().length;
  if(idx===curSong) return;
  const d=(idx-curSong+total)%total;
  navigate(d<=Math.floor(total/2)?1:-1);
}

function updateInfo(){
  const s=getSongs()[curSong];
  const titleEl=document.getElementById('dp-song-title');
  const enEl   =document.getElementById('dp-song-en');
  if(titleEl) titleEl.textContent=s.title;
  if(enEl)    enEl.textContent=s.en;
  document.getElementById('dc-lv-0').textContent='★'+s.levels[0];
  document.getElementById('dc-lv-1').textContent='★'+s.levels[1];
  document.getElementById('dc-lv-2').textContent='★'+s.levels[2];
  updateBottomLabel();
}

/* ── 難易度選択（唯一の定義） ── */
const DIFF_NAMES=['EASY','NORMAL','HARD'];
function selectDiff(d){
  curDiff=d;
  document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',i===d));
  updateBottomLabel();
  /* タップ時の小リップル */
  const btn=document.querySelectorAll('.diff-btn')[d];
  if(btn){
    const rip=document.createElement('div');
    const r=document.createElement('div');
    rip.style.cssText='position:absolute;inset:0;border-radius:10px;overflow:hidden;pointer-events:none;';
    r.style.cssText='position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,.22);transform:translate(-50%,-50%);animation:diffRip .45s ease-out forwards;';
    rip.appendChild(r);btn.appendChild(rip);
    setTimeout(()=>rip.remove(),500);
  }
}

function updateBottomLabel(){
  const s=getSongs()[curSong];
  const el=document.querySelector('.bottom-label');
  if(el) el.textContent='♫  '+s.title+'  ·  '+DIFF_NAMES[curDiff];
}

/* ── キャラクター切り替え ── */
function switchChar(ch){
  /* DUOはロックチェック */
  if(ch===2 && !isAllSongsPlayed()){
    showLockToast();
    return;
  }
  if(curChar===ch) return;
  curChar=ch; curSong=0; curDiff=1;

  /* 背景動画を切り替え */
  const vid=document.getElementById('bgVideo');
  if(vid){
    vid.src=ch===1?'ルナ_演奏_背景.mp4':'スマホ　ゲーム　背景.mp4';
    vid.load();
    vid.play().catch(()=>{});
  }

  /* テーマクラスを切り替え */
  document.body.classList.toggle('luna-select', ch===1);
  document.body.classList.toggle('duo-select',  ch===2);

  /* タブ状態更新（インデックスで一致させる） */
  const tabs=document.querySelectorAll('.char-tab');
  tabs.forEach((t,i)=>t.classList.toggle('active',i===ch));

  /* カルーセル＆ドット再構築 */
  rebuildCarousel();

  /* 難易度ボタンをNORMALにリセット */
  document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',i===1));

  /* 情報・テーマ更新 */
  updateInfo(); applyTheme(globalIdx());
  stopPreview();
}

function onPlayStart(e){
  const r=document.createElement('div');
  r.className='ripple';r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),600);
  const s=getSongs()[curSong];
  /* 選択情報をlocalStorageに保存（globalIdxでgame_uiと対応） */
  localStorage.setItem('selectedSong',      String(globalIdx()));
  localStorage.setItem('selectedDiff',      String(curDiff));
  localStorage.setItem('selectedDiffName',  DIFF_NAMES[curDiff]);
  localStorage.setItem('selectedSongType',  s.type || 'riz');
  localStorage.setItem('selectedSongTitle', s.title);
  stopPreview();
  setTimeout(()=>{ window.location.href='game_ui_v1.html'; },280);
}

/* ══════════ 音楽プレビューシステム ══════════ */
const SONG_SRCS=[

function playSongPreview(gIdx){

/* ══════════════════════════════════
   CANVAS ENGINE
══════════════════════════════════ */
const canvas =document.getElementById('gc');
const ctx    =canvas.getContext('2d');
const canvasR=document.getElementById('gc-rings');
const ctxR   =canvasR.getContext('2d');
const canvasF=document.getElementById('gc-front');
const ctxF   =canvasF.getContext('2d');
function W(){return canvas.width;} function H(){return canvas.height;}

function resize(){
  const w=document.body.clientWidth,h=document.body.clientHeight;
  [canvas,canvasR,canvasF].forEach(c=>{c.width=w;c.height=h;});
}
resize(); window.addEventListener('resize',resize);

let frame=0;

/* BG — video handles background, canvas is transparent */
function drawDiamondBG(c,cW,cH,t){
  /* video background visible through transparent canvas */
}

/* BG */
function drawBG(){
  drawDiamondBG(ctx,W(),H(),frame*.016);
  const [aR,aG,aB]=tA,[bR,bG,bB]=tB;

  /* ── Large ethereal rings behind jacket (drawn on bg canvas, z:0) ── */
  const jcx=W()*.45, jcy=H()-164;
  const bgRingDefs=[
    {r:130,alpha:.13,w:3.5,spd: .006,dash:0},
    {r:162,alpha:.08,w:2.0,spd:-.004,dash:18},
    {r:200,alpha:.05,w:1.5,spd: .003,dash:0},
    {r:240,alpha:.03,w:1.0,spd:-.002,dash:28},
  ];
  bgRingDefs.forEach((ring,i)=>{
    const col=i%2===0?tA:tB;
    const ang=frame*ring.spd;
    ctx.save();ctx.translate(jcx,jcy);ctx.rotate(ang);
    ctx.beginPath();ctx.arc(0,0,ring.r,0,Math.PI*2);
    if(ring.dash>0)ctx.setLineDash([ring.dash,ring.dash*.5]);
    else ctx.setLineDash([]);
    ctx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${ring.alpha})`;
    ctx.lineWidth=ring.w;
    ctx.shadowBlur=ring.w*6;ctx.shadowColor=`rgba(${col[0]},${col[1]},${col[2]},${ring.alpha*.8})`;
    ctx.stroke();ctx.setLineDash([]);ctx.shadowBlur=0;ctx.restore();
  });

  /* ── Mint diagonal connecting lines (LIZ → right panel) ── */
  const mintLines=[
    {x1:0,y1:H()*.76,x2:W(),y2:H()*.20,w:2.0,a:.065},
    {x1:0,y1:H()*.88,x2:W()*.88,y2:H()*.38,w:1.2,a:.042},
  ];
  mintLines.forEach(l=>{
    const pulse=.75+.25*Math.sin(frame*.018);
    const gr=ctx.createLinearGradient(l.x1,l.y1,l.x2,l.y2);
    gr.addColorStop(0,`rgba(0,255,208,0)`);
    gr.addColorStop(.15,`rgba(0,255,208,${l.a*pulse})`);
    gr.addColorStop(.50,`rgba(0,255,208,${l.a*1.5*pulse})`);
    gr.addColorStop(.80,`rgba(0,255,208,${l.a*pulse})`);
    gr.addColorStop(1,`rgba(0,255,208,0)`);
    ctx.save();
    ctx.beginPath();ctx.moveTo(l.x1,l.y1);ctx.lineTo(l.x2,l.y2);
    ctx.strokeStyle=gr;ctx.lineWidth=l.w;
    ctx.shadowBlur=14;ctx.shadowColor='rgba(0,255,208,.22)';
    ctx.stroke();ctx.shadowBlur=0;ctx.restore();
  });
}

/* Lasers radiating from jacket center */
const lasers=Array.from({length:14},()=>({
  angle:Math.random()*Math.PI*2,
  speed:(Math.random()*.5+.12)*(Math.random()<.5?1:-1),
  len:180+Math.random()*160,
  alpha:Math.random()*.22+.06,
  which:Math.random()<.5?'a':'b'
}));

function drawLasers(){
  const cx=W()*.45, cy=H()*.57;
  lasers.forEach(l=>{
    l.angle+=l.speed*.009;
    const col=l.which==='a'?tA:tB;
    const x2=cx+Math.cos(l.angle)*l.len, y2=cy+Math.sin(l.angle)*l.len;
    const gr=ctx.createLinearGradient(cx,cy,x2,y2);
    gr.addColorStop(0,`rgba(${col[0]},${col[1]},${col[2]},${l.alpha*.55})`);
    gr.addColorStop(.30,`rgba(${col[0]},${col[1]},${col[2]},${l.alpha})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x2,y2);
    ctx.strokeStyle=gr;ctx.lineWidth=1.5;
    ctx.shadowBlur=10;ctx.shadowColor=`rgba(${col[0]},${col[1]},${col[2]},.60)`;
    ctx.stroke();ctx.shadowBlur=0;
  });
}

/* Floor grid */
function drawFloor(){
  const gY=H()*.86, vp={x:W()*.45,y:H()*.56};
  ctx.save();ctx.globalAlpha=.14;
  ctx.strokeStyle=`rgba(${tB[0]},${tB[1]},${tB[2]},1)`;ctx.lineWidth=.7;
  for(let i=0;i<=9;i++){
    const t=i/9,y=gY+(H()-gY)*t;
    const xL=vp.x+(0-vp.x)*t*2.0, xR=vp.x+(W()-vp.x)*t*2.0;
    ctx.beginPath();ctx.moveTo(xL,y);ctx.lineTo(xR,y);ctx.stroke();
  }
  for(let i=-8;i<=8;i++){
    ctx.beginPath();ctx.moveTo(vp.x,vp.y);ctx.lineTo(W()*.45+i*(W()*.072),H());ctx.stroke();
  }
  ctx.restore();
}

/* Spotlights */
function drawSpotlights(){
  [{x:.18,c:tA},{x:.52,c:tA},{x:.82,c:tB}].forEach((sp,si)=>{
    const cx=W()*sp.x, sw=Math.sin(frame*.012+si*2.1)*W()*.10;
    const tx=cx+sw, ty=H();
    const gr=ctx.createLinearGradient(cx,0,tx,ty);
    gr.addColorStop(0,`rgba(${sp.c[0]},${sp.c[1]},${sp.c[2]},.09)`);
    gr.addColorStop(1,'rgba(255,255,255,0)');
    ctx.save();ctx.beginPath();
    ctx.moveTo(cx-8,0);ctx.lineTo(tx-60,ty);ctx.lineTo(tx+60,ty);ctx.lineTo(cx+8,0);
    ctx.closePath();ctx.fillStyle=gr;ctx.fill();ctx.restore();
  });
}

/* ── RINGS around center card ──
   Card center: left=calc(52%-100px)+100 = 52% of W
   Card center Y: H - 48(bottom) - 16(bottom offset) - 100(half height) = H-164 */
function cCX(){return W()*.52;}
function cCY(){return H()-164;}

const RINGS=[
  {r:105,spd: 1.0,col:'a',alpha:.62,dash:0, w:2.5},
  {r:122,spd:-.72,col:'b',alpha:.46,dash:7, w:1.6},
  {r:142,spd: .52,col:'a',alpha:.30,dash:0, w:1.0},
  {r:165,spd:-.38,col:'b',alpha:.18,dash:13,w:.8},
  {r:190,spd: .24,col:'a',alpha:.10,dash:0, w:.5},
];
const ringAng=[0,0,0,0,0];

const ORBS=[
  {ring:0,ang:0,           spd: 1.55,sz:5.5,col:'a'},
  {ring:1,ang:Math.PI,     spd:-1.15,sz:4.5,col:'b'},
  {ring:2,ang:Math.PI*.5,  spd: .82, sz:4.0,col:'a'},
  {ring:0,ang:Math.PI*1.5, spd: 1.55,sz:3.5,col:'b'},
  {ring:3,ang:Math.PI*.28, spd:-.48, sz:3.0,col:'a'},
];

function drawRings(){
  ctxR.clearRect(0,0,canvasR.width,canvasR.height);
  const cx=cCX(), cy=cCY();

  RINGS.forEach((ring,i)=>{
    ringAng[i]+=ring.spd*.0090;
    const col=ring.col==='a'?tA:tB;
    ctxR.save();ctxR.translate(cx,cy);ctxR.rotate(ringAng[i]);
    ctxR.beginPath();ctxR.arc(0,0,ring.r,0,Math.PI*2);
    if(ring.dash>0) ctxR.setLineDash([ring.dash,ring.dash*.55]);
    else ctxR.setLineDash([]);
    ctxR.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${ring.alpha})`;
    ctxR.lineWidth=ring.w;
    ctxR.shadowBlur=ring.w*8;ctxR.shadowColor=`rgba(${col[0]},${col[1]},${col[2]},${ring.alpha*.80})`;
    ctxR.stroke();ctxR.setLineDash([]);ctxR.shadowBlur=0;ctxR.restore();
  });

  ORBS.forEach(orb=>{
    orb.ang+=orb.spd*.015;
    const r=RINGS[orb.ring].r, col=orb.col==='a'?tA:tB;
    const x=cx+Math.cos(orb.ang)*r, y=cy+Math.sin(orb.ang)*r;
    /* Comet tail */
    for(let t=5;t>=1;t--){
      const ta=orb.ang-orb.spd*.015*t*2.6;
      const tx2=cx+Math.cos(ta)*r, ty2=cy+Math.sin(ta)*r;
      ctxR.beginPath();ctxR.arc(tx2,ty2,orb.sz*(1-t*.15),0,Math.PI*2);
      ctxR.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${(1-t/6)*.52})`;ctxR.fill();
    }
    ctxR.beginPath();ctxR.arc(x,y,orb.sz,0,Math.PI*2);
    ctxR.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},1)`;
    ctxR.shadowBlur=orb.sz*7;ctxR.shadowColor=`rgba(${col[0]},${col[1]},${col[2]},1)`;
    ctxR.fill();ctxR.shadowBlur=0;
  });

  /* Radial burst rays at card border */
  for(let i=0;i<12;i++){
    const ang=ringAng[0]+i*(Math.PI/6);
    const x1=cx+Math.cos(ang)*97,  y1=cy+Math.sin(ang)*97;
    const x2=cx+Math.cos(ang)*110, y2=cy+Math.sin(ang)*110;
    const col=i%2===0?tA:tB;
    ctxR.beginPath();ctxR.moveTo(x1,y1);ctxR.lineTo(x2,y2);
    ctxR.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},.68)`;
    ctxR.lineWidth=2.2;ctxR.shadowBlur=6;ctxR.shadowColor=`rgba(${col[0]},${col[1]},${col[2]},.90)`;
    ctxR.stroke();ctxR.shadowBlur=0;
  }
}

/* Music notes */
class MusicNote{
  constructor(){this.reset();}
  reset(){
    this.x=Math.random()*W();this.y=H()+20;
    this.vx=(Math.random()-.5)*.68;this.vy=-(Math.random()*.98+.28);
    this.rot=Math.random()*Math.PI*2;this.rv=(Math.random()-.5)*.028;
    this.sz=Math.random()*14+7;this.life=0;this.max=Math.random()*145+55;
    this.char=['♩','♪','♫','♬','𝄞'][Math.floor(Math.random()*5)];
    const p=Math.random();
    if(p<.28)this.col='255,60,180';
    else if(p<.52)this.col='0,220,200';
    else if(p<.68)this.col='180,100,255';
    else if(p<.82)this.col='255,215,60';
    else this.col='0,200,255';
  }
  step(){this.x+=this.vx;this.y+=this.vy;this.rot+=this.rv;this.life++;if(this.y<-30||this.life>this.max)this.reset();}
  draw(){
    const fi=Math.min(1,this.life/18),fo=Math.max(0,1-(this.life-this.max*.65)/(this.max*.35));
    const a=.78*fi*fo;if(a<.02)return;
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.font=`${this.sz}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=`rgba(${this.col},${a})`;
    ctx.shadowBlur=this.sz*.95;ctx.shadowColor=`rgba(${this.col},.75)`;
    ctx.fillText(this.char,0,0);ctx.shadowBlur=0;ctx.restore();
  }
}
const musicNotes=Array.from({length:32},()=>new MusicNote());

/* BG sparkles */
class Spark{
  constructor(){this.init();}
  init(){
    this.x=Math.random()*W();this.y=Math.random()*H();
    this.r=Math.random()*2.0+.4;
    this.vx=(Math.random()-.5)*.55;this.vy=-(Math.random()*.68+.10);
    this.life=0;this.max=Math.random()*108+38;
    const p=Math.random();
    if(p<.25)this.col='0,230,185';
    else if(p<.50)this.col='255,90,180';
    else if(p<.68)this.col='175,95,255';
    else if(p<.82)this.col='255,215,55';
    else this.col='255,255,255';
  }
  step(){this.x+=this.vx;this.y+=this.vy;this.life++;if(this.life>this.max)this.init();}
  draw(){
    const fi=Math.min(1,this.life/14),fo=Math.max(0,1-(this.life-this.max*.6)/(this.max*.4));
    const a=.75*fi*fo;if(a<.01)return;
    ctx.shadowBlur=this.r*5;ctx.shadowColor=`rgba(${this.col},${a*.6})`;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${this.col},${a})`;ctx.fill();ctx.shadowBlur=0;
  }
}
const sparks=Array.from({length:68},()=>new Spark());

/* Burst sparks around jacket */
class BurstSpark{
  constructor(){this.init();}
  init(){
    const ang=Math.random()*Math.PI*2, rr=88+Math.random()*95;
    this.x=cCX()+Math.cos(ang)*rr;this.y=cCY()+Math.sin(ang)*rr;
    this.vx=(Math.random()-.5)*3.2;this.vy=(Math.random()-.5)*3.2-Math.random()*.5;
    this.r=Math.random()*3.0+.6;this.life=0;this.max=Math.random()*48+16;
    const which=Math.random()<.5?tA:tB;
    this.col=`${which[0]},${which[1]},${which[2]}`;
  }
  step(){this.x+=this.vx;this.y+=this.vy;this.vy+=.07;this.life++;if(this.life>this.max)this.init();}
  draw(){
    const fo=Math.max(0,1-this.life/this.max),a=.94*fo;if(a<.01)return;
    ctxF.beginPath();ctxF.arc(this.x,this.y,this.r*fo+.2,0,Math.PI*2);
    ctxF.fillStyle=`rgba(${this.col},${a})`;
    ctxF.shadowBlur=this.r*8;ctxF.shadowColor=`rgba(${this.col},.88)`;
    ctxF.fill();ctxF.shadowBlur=0;
  }
}
const burstSparks=Array.from({length:55},()=>new BurstSpark());

/* Front sparkles (diamonds + circles) */
class FrontSpark{
  constructor(){this.init();}
  init(){
    this.x=Math.random()*canvasF.width;this.y=Math.random()*canvasF.height*.90;
    this.r=Math.random()*2.4+.8;
    this.vx=(Math.random()-.5)*.58;this.vy=-(Math.random()*.60+.12);
    this.life=0;this.max=Math.random()*88+38;this.isDiamond=Math.random()>.46;
    const p=Math.random();
    if(p<.30)this.col='0,235,200';
    else if(p<.55)this.col='255,90,180';
    else if(p<.72)this.col='180,100,255';
    else if(p<.86)this.col='255,215,60';
    else this.col='255,255,255';
  }
  step(){this.x+=this.vx;this.y+=this.vy;this.life++;if(this.life>this.max)this.init();}
  draw(){
    const fi=Math.min(1,this.life/12),fo=Math.max(0,1-(this.life-this.max*.62)/(this.max*.38));
    const a=.88*fi*fo;if(a<.01)return;
    ctxF.shadowBlur=this.r*7;ctxF.shadowColor=`rgba(${this.col},${a*.65})`;
    if(!this.isDiamond){
      ctxF.beginPath();ctxF.arc(this.x,this.y,this.r,0,Math.PI*2);
      ctxF.fillStyle=`rgba(${this.col},${a})`;ctxF.fill();
    } else {
      const s=this.r*2.6;
      ctxF.beginPath();
      ctxF.moveTo(this.x,this.y-s);ctxF.lineTo(this.x+s*.30,this.y-s*.30);
      ctxF.lineTo(this.x+s,this.y);ctxF.lineTo(this.x+s*.30,this.y+s*.30);
      ctxF.lineTo(this.x,this.y+s);ctxF.lineTo(this.x-s*.30,this.y+s*.30);
      ctxF.lineTo(this.x-s,this.y);ctxF.lineTo(this.x-s*.30,this.y-s*.30);
      ctxF.closePath();ctxF.fillStyle=`rgba(${this.col},${a})`;ctxF.fill();
    }
    ctxF.shadowBlur=0;
  }
}
const frontSparks=Array.from({length:24},()=>new FrontSpark());

/* LIZ floor glow (canvas layer reinforcement) */
function drawLizFloor(){
  /* LIZ area: left≈-4% to 48%, foot at y=H()-48px */
  const lx=W()*.22, ly=H()-48;

  /* Mint green floor reflection pool */
  ctx.save();
  ctx.scale(1,.28);
  const gr=ctx.createRadialGradient(lx,ly/.28,0,lx,ly/.28,W()*.20);
  gr.addColorStop(0,'rgba(0,255,208,.22)');
  gr.addColorStop(.45,'rgba(0,210,175,.06)');
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr;ctx.beginPath();
  ctx.arc(lx,ly/.28,W()*.20,0,Math.PI*2);
  ctx.fill();ctx.restore();

  /* 足元の影 — ライト背景ではごく薄く */
  ctx.save();
  ctx.scale(1,.30);
  const sg=ctx.createRadialGradient(lx,(ly+4)/.30,0,lx,(ly+4)/.30,W()*.11);
  sg.addColorStop(0,'rgba(180,150,200,.18)');
  sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sg;ctx.beginPath();
  ctx.arc(lx,(ly+4)/.30,W()*.11,0,Math.PI*2);
  ctx.fill();ctx.restore();
}

/* Vignette — ライト背景では無効 */
function drawVignette(){}

/* Render loop */
function render(){
  frame++;lerpTheme();
  ctx.clearRect(0,0,W(),H());
  drawBG();drawLasers();drawFloor();
  drawLizFloor();
  drawVignette();
  ctxF.clearRect(0,0,canvasF.width,canvasF.height);
  requestAnimationFrame(render);
}
render();
</script>
